{% set name = "markov_draftjs" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/markov_draftjs-{{ version }}.tar.gz
  sha256: 392288751affb0fa4769e6d8e92e07108fec8be19b7b3823e384c6c49cc921e1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - markov_draftjs
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/thibaudcolas/markov_draftjs
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Draft.js sample content generated with Markov chains of Project Gutenberg books.'
  description: Draft.js sample content generated with Markov chains of Project Gutenberg books.
  doc_url: https://github.com/thibaudcolas/markov_draftjs
  dev_url: https://github.com/thibaudcolas/markov_draftjs

extra:
  recipe-maintainers:
    - cshaley
    - rxm7706
    - sannykr
